services:
  db:
    image: postgres:16-alpine
    profiles:
      - local-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pinocchio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pinocchio}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    command: sh -c "sh /opt/pinocchio-nginx/render-config.sh && exec nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-pusanpino.kro.kr}
      APP_DOMAIN_ALIASES: ${APP_DOMAIN_ALIASES:-}
    volumes:
      - ./nginx:/opt/pinocchio-nginx:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started

  certbot:
    image: certbot/certbot:latest
    profiles:
      - ssl
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://api:3000
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-pusanpino.kro.kr,.pusanpino.kro.kr}
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run api"
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      POSTGRES_URL: ${POSTGRES_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-pinocchio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SSL: ${POSTGRES_SSL:-disable}
      ADMIN_CODE: ${ADMIN_CODE:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

volumes:
  db_data:
  certbot_www:
  letsencrypt:
  web_node_modules:
  api_node_modules:
